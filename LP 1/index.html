<body>

  <div class="main">

            <p>
            Pikachu is an Electric-type Pokémon introduced
            in Generation I. Pikachu are small, chubby,

            yellow fur.

            <div class="slide">
            <div class="line"></div>
            <span>01 / 08</span>
            </div>
        </div>

    </div>

    <div class="right"></div>

    <img src="pikachu.png" class="pikachu" />

    <img src="3-line.png" class="menu">

    <div class="dots">
      <span class="dark"></span>

      <span></span>
